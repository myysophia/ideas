<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" width="960" height="600">
  <style>
    text { font-family: 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', Helvetica, Arial, sans-serif; }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#F48120"/>
    </marker>
    <marker id="arrow-blue-open" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M 0 0 L 10 4 L 0 8" fill="none" stroke="#2563eb" stroke-width="1.5"/>
    </marker>
    <filter id="shadow-sm">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="600" fill="#ffffff"/>

  <!-- Title -->
  <text x="480" y="28" text-anchor="middle" fill="#111827" font-size="18" font-weight="600">Tier 3: Browser Run — 浏览器能力层</text>

  <!-- Agent Hexagon at (150, 70) -->
  <polygon points="150,38 181.2,54 181.2,86 150,102 118.8,86 118.8,54" fill="#fff7ed" stroke="#F48120" stroke-width="2"/>
  <text x="150" y="73" text-anchor="middle" fill="#F48120" font-size="12" font-weight="600">Agent / Think</text>

  <!-- Agent Tools Column (x=80-230) -->
  <!-- browser_search tool box (y=200) -->
  <rect x="80" y="190" width="150" height="50" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow-sm)"/>
  <text x="100" y="212" fill="#2563eb" font-size="14">&#x2699;</text>
  <text x="118" y="212" fill="#1e40af" font-size="13" font-weight="600">browser_search</text>
  <text x="155" y="228" text-anchor="middle" fill="#6b7280" font-size="11">搜索 &amp; 导航</text>

  <!-- browser_execute tool box (y=280) -->
  <rect x="80" y="270" width="150" height="50" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow-sm)"/>
  <text x="100" y="292" fill="#2563eb" font-size="14">&#x2699;</text>
  <text x="118" y="292" fill="#1e40af" font-size="13" font-weight="600">browser_execute</text>
  <text x="155" y="308" text-anchor="middle" fill="#6b7280" font-size="11">执行 &amp; 提取</text>

  <!-- Large Browser Window (x=300, y=160, w=400, h=320) -->
  <rect x="300" y="160" width="400" height="320" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="2" filter="url(#shadow-sm)"/>
  <!-- Title bar -->
  <rect x="300" y="160" width="400" height="28" rx="8" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
  <rect x="300" y="180" width="400" height="8" fill="#f3f4f6"/>
  <!-- Traffic light dots -->
  <circle cx="318" cy="174" r="5" fill="#ef4444" opacity="0.85"/>
  <circle cx="334" cy="174" r="5" fill="#f59e0b" opacity="0.85"/>
  <circle cx="350" cy="174" r="5" fill="#10b981" opacity="0.85"/>
  <!-- Headless Chrome label in title bar -->
  <text x="500" y="178" text-anchor="middle" fill="#374151" font-size="12" font-weight="600">Headless Chrome</text>

  <!-- CDP label -->
  <text x="500" y="210" text-anchor="middle" fill="#6b7280" font-size="12">CDP (Chrome DevTools Protocol)</text>

  <!-- Simplified webpage outline inside -->
  <rect x="340" y="225" width="320" height="200" rx="4" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <!-- Nav bar -->
  <rect x="352" y="237" width="296" height="18" rx="3" fill="#dbeafe" stroke="#bfdbfe" stroke-width="0.5"/>
  <rect x="360" y="243" width="40" height="6" rx="2" fill="#93c5fd"/>
  <rect x="410" y="243" width="40" height="6" rx="2" fill="#93c5fd"/>
  <rect x="460" y="243" width="40" height="6" rx="2" fill="#93c5fd"/>
  <!-- Hero area -->
  <rect x="352" y="265" width="296" height="40" rx="3" fill="#e5e7eb" opacity="0.6"/>
  <rect x="370" y="278" width="100" height="8" rx="2" fill="#9ca3af"/>
  <rect x="370" y="290" width="60" height="8" rx="2" fill="#9ca3af"/>
  <!-- Content lines -->
  <rect x="352" y="315" width="140" height="6" rx="2" fill="#d1d5db"/>
  <rect x="352" y="329" width="296" height="6" rx="2" fill="#e5e7eb"/>
  <rect x="352" y="343" width="260" height="6" rx="2" fill="#e5e7eb"/>
  <rect x="352" y="357" width="280" height="6" rx="2" fill="#e5e7eb"/>
  <rect x="352" y="371" width="200" height="6" rx="2" fill="#e5e7eb"/>
  <rect x="352" y="385" width="240" height="6" rx="2" fill="#e5e7eb"/>
  <rect x="352" y="399" width="180" height="6" rx="2" fill="#e5e7eb"/>
  <!-- Footer -->
  <rect x="352" y="410" width="296" height="8" rx="2" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="0.5"/>

  <!-- Live View badge -->
  <rect x="580" y="160" width="76" height="22" rx="4" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <circle cx="594" cy="171" r="4" fill="#22c55e"/>
  <text x="624" y="175" text-anchor="middle" fill="#166534" font-size="10" font-weight="600">Live View</text>

  <!-- Human in the Loop badge -->
  <rect x="560" y="188" width="114" height="22" rx="4" fill="#fff7ed" stroke="#fed7aa" stroke-width="1"/>
  <text x="617" y="203" text-anchor="middle" fill="#9a3412" font-size="10" font-weight="600">Human in the Loop</text>

  <!-- Right side: Target services column (x=750-920) -->
  <!-- External service label -->
  <text x="830" y="192" text-anchor="middle" fill="#9ca3af" font-size="11" font-style="italic">External (无 API)</text>

  <!-- 无 API 的网站 box (y=200) -->
  <rect x="750" y="200" width="160" height="42" rx="6" fill="#ffffff" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="830" y="225" text-anchor="middle" fill="#374151" font-size="13">无 API 的网站</text>

  <!-- 后台管理系统 box (y=280) -->
  <rect x="750" y="280" width="160" height="42" rx="6" fill="#ffffff" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="830" y="305" text-anchor="middle" fill="#374151" font-size="13">后台管理系统</text>

  <!-- 需要渲染的页面 box (y=360) -->
  <rect x="750" y="360" width="160" height="42" rx="6" fill="#ffffff" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="830" y="385" text-anchor="middle" fill="#374151" font-size="13">需要渲染的页面</text>

  <!-- Properties bar (200, 520, 560, 55) -->
  <rect x="200" y="520" width="560" height="45" rx="8" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="480" y="548" text-anchor="middle" fill="#6b7280" font-size="13">每次新会话  |  无 cookie 继承  |  输出截断 ~6000 token</text>

  <!-- ============ ARROWS ============ -->

  <!-- Agent -> browser_search (blue) -->
  <path d="M 155,102 L 155,186" stroke="#2563eb" stroke-width="1.5" fill="none" marker-end="url(#arrow-blue)"/>

  <!-- browser_search -> Browser (blue, label "查询 CDP 协议") -->
  <path d="M 230,215 L 296,215" stroke="#2563eb" stroke-width="1.5" fill="none" marker-end="url(#arrow-blue)"/>
  <rect x="228" y="198" width="72" height="16" rx="3" fill="#ffffff" fill-opacity="0.95"/>
  <text x="264" y="210" text-anchor="middle" fill="#2563eb" font-size="11">查询 CDP 协议</text>

  <!-- browser_execute -> Browser (blue, label "发送 CDP 命令") -->
  <path d="M 230,295 L 296,295" stroke="#2563eb" stroke-width="1.5" fill="none" marker-end="url(#arrow-blue)"/>
  <rect x="226" y="278" width="74" height="16" rx="3" fill="#ffffff" fill-opacity="0.95"/>
  <text x="263" y="290" text-anchor="middle" fill="#2563eb" font-size="11">发送 CDP 命令</text>

  <!-- Browser -> Target services (blue dashed, label "渲染 &amp; 交互") -->
  <path d="M 700,280 L 746,280" stroke="#2563eb" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arrow-blue-open)"/>
  <rect x="704" y="264" width="72" height="16" rx="3" fill="#ffffff" fill-opacity="0.95"/>
  <text x="740" y="276" text-anchor="middle" fill="#2563eb" font-size="11">渲染 &amp; 交互</text>

  <!-- Additional dashed lines from Browser to other targets -->
  <path d="M 700,300 L 746,300" stroke="#2563eb" stroke-width="1" fill="none" stroke-dasharray="5,3" opacity="0.5" marker-end="url(#arrow-blue-open)"/>
  <path d="M 700,340 L 746,380" stroke="#2563eb" stroke-width="1" fill="none" stroke-dasharray="5,3" opacity="0.5" marker-end="url(#arrow-blue-open)"/>

  <!-- Agent -> Target services (orange dashed, label "当没有 MCP/API 时") -->
  <path d="M 181,75 C 400,40 600,50 746,75" stroke="#F48120" stroke-width="1.5" fill="none" stroke-dasharray="6,4" marker-end="url(#arrow-orange)"/>
  <rect x="380" y="34" width="120" height="18" rx="3" fill="#ffffff" fill-opacity="0.95"/>
  <text x="440" y="48" text-anchor="middle" fill="#F48120" font-size="11" font-weight="600">当没有 MCP/API 时</text>

  <!-- Legend -->
  <g transform="translate(30, 565)">
    <line x1="0" y1="8" x2="30" y2="8" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
    <text x="36" y="12" fill="#6b7280" font-size="12">CDP 调用</text>
    <line x1="120" y1="8" x2="150" y2="8" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="5,3"/>
    <text x="156" y="12" fill="#6b7280" font-size="12">浏览器渲染</text>
    <line x1="270" y1="8" x2="300" y2="8" stroke="#F48120" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow-orange)"/>
    <text x="306" y="12" fill="#6b7280" font-size="12">降级路径</text>
  </g>
</svg>