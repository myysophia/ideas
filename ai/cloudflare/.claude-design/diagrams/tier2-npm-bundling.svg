<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" width="960" height="600">
  <style>
    text { font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Helvetica, Arial, sans-serif; }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#F48120"/>
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="960" height="600" fill="#ffffff"/>

  <!-- Title -->
  <text x="480" y="30" text-anchor="middle" fill="#111827" font-size="18" font-weight="600">Tier 2: npm 依赖层 — 生态扩展</text>

  <!-- Cloudflare Brand Badge -->
  <circle cx="48" cy="26" r="16" fill="#F48120"/>
  <text x="48" y="31" text-anchor="middle" fill="#ffffff" font-size="9" font-weight="700">CF</text>
  <text x="72" y="31" fill="#F48120" font-size="13" font-weight="600">Workers AI</text>

  <!-- Flow direction indicator -->
  <text x="480" y="58" text-anchor="middle" fill="#9ca3af" font-size="12" font-style="italic">Pipeline Flow (左 → 右)</text>
  <line x1="200" y1="65" x2="760" y2="65" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow-blue)" opacity="0.4"/>

  <!-- ===== Agent with code (120, 130) ===== -->
  <polygon points="120,94 151.2,112 151.2,148 120,166 88.8,148 88.8,112" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="120" y="135" text-anchor="middle" fill="#111827" font-size="13" font-weight="600">Agent</text>

  <!-- Code box below agent -->
  <rect x="55" y="182" width="130" height="55" rx="6" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.2"/>
  <text x="120" y="200" text-anchor="middle" fill="#6b7280" font-size="10">import</text>
  <text x="120" y="218" text-anchor="middle" fill="#111827" font-size="11" font-weight="600" font-family="monospace">{ z } from "zod"</text>
  <text x="120" y="232" text-anchor="middle" fill="#6b7280" font-size="10">用户依赖声明</text>

  <!-- Arrow: Agent+Code -> npm registry -->
  <line x1="185" y1="210" x2="240" y2="160" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <rect x="180" y="172" width="36" height="18" rx="3" fill="#ffffff" opacity="0.95"/>
  <text x="198" y="185" text-anchor="middle" fill="#2563eb" font-size="12">解析</text>

  <!-- ===== Stage 1: npm registry cylinder (cx=300, top=120) ===== -->
  <ellipse cx="300" cy="120" rx="52" ry="14" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <rect x="248" y="120" width="104" height="60" fill="#dbeafe" stroke="none"/>
  <line x1="248" y1="120" x2="248" y2="180" stroke="#2563eb" stroke-width="1.5"/>
  <line x1="352" y1="120" x2="352" y2="180" stroke="#2563eb" stroke-width="1.5"/>
  <ellipse cx="300" cy="180" rx="52" ry="14" fill="#bfdbfe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="300" y="147" text-anchor="middle" fill="#111827" font-size="11" font-weight="600">npm</text>
  <text x="300" y="163" text-anchor="middle" fill="#111827" font-size="11" font-weight="600">registry</text>

  <!-- Arrow: npm -> bundler with label "拉取依赖" -->
  <line x1="354" y1="150" x2="438" y2="150" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <rect x="368" y="134" width="60" height="18" rx="3" fill="#ffffff" opacity="0.95"/>
  <text x="398" y="147" text-anchor="middle" fill="#2563eb" font-size="12">拉取依赖</text>

  <!-- ===== Stage 2: worker-bundler box (440, 118, 160, 64) ===== -->
  <rect x="440" y="118" width="160" height="64" rx="8" fill="#fff7ed" stroke="#F48120" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="520" y="146" text-anchor="middle" fill="#F48120" font-size="13" font-weight="600">worker-bundler</text>
  <text x="520" y="168" text-anchor="middle" fill="#6b7280" font-size="11">esbuild</text>

  <!-- Arrow: bundler -> bundle artifact with label "esbuild 构建" -->
  <line x1="602" y1="150" x2="648" y2="150" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <rect x="604" y="134" width="72" height="18" rx="3" fill="#ffffff" opacity="0.95"/>
  <text x="640" y="147" text-anchor="middle" fill="#2563eb" font-size="12">esbuild 构建</text>

  <!-- ===== Stage 3: Bundle artifact box (650, 118, 150, 64) ===== -->
  <rect x="650" y="118" width="150" height="64" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="725" y="146" text-anchor="middle" fill="#16a34a" font-size="13" font-weight="600">Bundle 产物</text>
  <text x="725" y="168" text-anchor="middle" fill="#6b7280" font-size="11">Single JS file</text>

  <!-- Arrow: bundle -> Dynamic Worker (down with label "Worker Loader") -->
  <path d="M 725,182 L 725,220 L 680,220 L 680,260" stroke="#2563eb" stroke-width="1.5" fill="none" marker-end="url(#arrow-blue)"/>
  <rect x="690" y="206" width="80" height="18" rx="3" fill="#ffffff" opacity="0.95"/>
  <text x="730" y="219" text-anchor="middle" fill="#2563eb" font-size="12">Worker Loader</text>

  <!-- ===== Dynamic Worker Sandbox (reuses Tier 1, 540, 260, 260, 80) ===== -->
  <rect x="540" y="262" width="260" height="80" rx="12" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" stroke-dasharray="8,4" filter="url(#shadow)"/>
  <text x="556" y="282" fill="#2563eb" font-size="11" font-weight="600" letter-spacing="0.06em">V8 ISOLATE</text>
  <rect x="570" y="292" width="200" height="36" rx="6" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="670" y="315" text-anchor="middle" fill="#2563eb" font-size="13" font-weight="600">Dynamic Worker</text>
  <text x="670" y="360" text-anchor="middle" fill="#6b7280" font-size="11">(复用 Tier 1 沙箱)</text>

  <!-- ===== Additional pipeline detail: version resolution box ===== -->
  <!-- Small detail boxes showing pipeline sub-steps -->
  <rect x="200" y="210" width="100" height="30" rx="6" fill="#faf5ff" stroke="#ede9fe" stroke-width="1"/>
  <text x="250" y="230" text-anchor="middle" fill="#7c3aed" font-size="11">版本解析</text>

  <rect x="320" y="210" width="100" height="30" rx="6" fill="#faf5ff" stroke="#ede9fe" stroke-width="1"/>
  <text x="370" y="230" text-anchor="middle" fill="#7c3aed" font-size="11">依赖下载</text>

  <!-- Connecting these to pipeline -->
  <line x1="300" y1="180" x2="300" y2="210" stroke="#7c3aed" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <line x1="370" y1="210" x2="440" y2="170" stroke="#7c3aed" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>

  <!-- ===== Bottom Note Box (200, 420, 560, 105) ===== -->
  <rect x="200" y="400" width="560" height="110" rx="8" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.2"/>
  <text x="216" y="422" fill="#6b7280" font-size="11" font-weight="600" letter-spacing="0.06em">NOTE</text>

  <text x="216" y="446" fill="#111827" font-size="13">仍运行在 Tier 1 沙箱内</text>

  <text x="216" y="470" fill="#111827" font-size="13">新增: 包获取 → 版本解析 → 构建 → 打包 → 加载</text>

  <!-- Risk callout (red warning box) -->
  <rect x="216" y="484" width="528" height="18" rx="4" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="480" y="497" text-anchor="middle" fill="#dc2626" font-size="12" font-weight="600">⚠ 供应链风险 | bundle 冷路径延迟 | 版本漂移</text>

  <!-- ===== Legend ===== -->
  <g transform="translate(200, 540)">
    <line x1="0" y1="8" x2="30" y2="8" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
    <text x="36" y="12" fill="#6b7280" font-size="12">数据/调用流</text>

    <rect x="140" y="1" width="14" height="14" rx="3" fill="#fff7ed" stroke="#F48120" stroke-width="1"/>
    <text x="160" y="12" fill="#6b7280" font-size="12">构建工具</text>

    <rect x="240" y="1" width="14" height="14" rx="3" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
    <text x="260" y="12" fill="#6b7280" font-size="12">产出物</text>

    <rect x="330" y="1" width="14" height="14" rx="3" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
    <text x="350" y="12" fill="#6b7280" font-size="12">风险提示</text>

    <rect x="430" y="1" width="14" height="14" rx="3" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="450" y="12" fill="#6b7280" font-size="12">V8 沙箱</text>
  </g>

  <!-- ===== Flow step numbers ===== -->
  <circle cx="300" cy="110" r="10" fill="#2563eb"/>
  <text x="300" y="114" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="700">1</text>

  <circle cx="520" cy="110" r="10" fill="#F48120"/>
  <text x="520" y="114" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="700">2</text>

  <circle cx="725" cy="110" r="10" fill="#16a34a"/>
  <text x="725" y="114" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="700">3</text>

  <circle cx="680" cy="260" r="10" fill="#2563eb"/>
  <text x="680" y="264" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="700">4</text>
</svg>