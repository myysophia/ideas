<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 800" width="960" height="800">
  <style>
    text { font-family: 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', Helvetica, Arial, sans-serif; }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#059669"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="800" fill="#ffffff"/>

  <!-- Title -->
  <text x="480" y="35" text-anchor="middle" fill="#111827" font-size="18" font-weight="600">Cloudflare 智能体五层架构总览</text>

  <!-- User Icon (center top) -->
  <circle cx="480" cy="62" r="10" fill="#f9fafb" stroke="#374151" stroke-width="1.2"/>
  <path d="M 466,82 Q 466,66 480,66 Q 494,66 494,82" fill="#f9fafb" stroke="#374151" stroke-width="1.2"/>
  <rect x="420" y="86" width="120" height="18" rx="3" fill="#ffffff" opacity="0.95"/>
  <text x="480" y="99" text-anchor="middle" fill="#374151" font-size="13">用户请求 / 事件</text>

  <!-- Arrow: User -> Agent -->
  <line x1="480" y1="106" x2="480" y2="120" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- Agent Hexagon -->
  <polygon points="480,120 504.25,134 504.25,162 480,176 455.75,162 455.75,134" fill="#F48120" stroke="#e07010" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="480" y="147" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="600">Agent</text>
  <text x="480" y="161" text-anchor="middle" fill="#ffffff" font-size="11">Think</text>

  <!-- Arrow: Agent -> Tier 4 -->
  <line x1="480" y1="176" x2="480" y2="198" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- ============================================ -->
  <!-- EXECUTION LADDER - 5 TIERS                  -->
  <!-- ============================================ -->

  <!-- Tier 4: Sandbox (y=200-285) -->
  <rect x="220" y="200" width="520" height="85" rx="8" fill="#fef2f2" stroke="#fee2e2" stroke-width="1.5"/>
  <text x="236" y="222" fill="#991b1b" font-size="13" font-weight="600">Tier 4: Sandbox</text>
  <rect x="240" y="232" width="130" height="40" rx="6" fill="#ffffff" stroke="#fecaca" stroke-width="1.2"/>
  <text x="305" y="257" text-anchor="middle" fill="#7f1d1d" font-size="13">Containers</text>
  <rect x="390" y="232" width="130" height="40" rx="6" fill="#ffffff" stroke="#fecaca" stroke-width="1.2"/>
  <text x="455" y="257" text-anchor="middle" fill="#7f1d1d" font-size="13">VM 隔离</text>
  <rect x="540" y="232" width="130" height="40" rx="6" fill="#ffffff" stroke="#fecaca" stroke-width="1.2"/>
  <text x="605" y="257" text-anchor="middle" fill="#7f1d1d" font-size="13">完整 OS</text>

  <!-- Arrow Tier4 -> Tier3 -->
  <line x1="480" y1="285" x2="480" y2="298" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- Tier 3: Browser Run (y=300-385) -->
  <rect x="220" y="300" width="520" height="85" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
  <text x="236" y="322" fill="#9a3412" font-size="13" font-weight="600">Tier 3: Browser Run</text>
  <rect x="240" y="332" width="130" height="40" rx="6" fill="#ffffff" stroke="#fdba74" stroke-width="1.2"/>
  <text x="305" y="357" text-anchor="middle" fill="#7c2d12" font-size="13">CDP 协议</text>
  <rect x="390" y="332" width="130" height="40" rx="6" fill="#ffffff" stroke="#fdba74" stroke-width="1.2"/>
  <text x="455" y="357" text-anchor="middle" fill="#7c2d12" font-size="13">Headless Browser</text>
  <rect x="540" y="332" width="130" height="40" rx="6" fill="#ffffff" stroke="#fdba74" stroke-width="1.2"/>
  <text x="605" y="357" text-anchor="middle" fill="#7c2d12" font-size="13">Live View</text>

  <!-- Arrow Tier3 -> Tier2 -->
  <line x1="480" y1="385" x2="480" y2="398" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- Tier 2: npm 依赖层 (y=400-485) -->
  <rect x="220" y="400" width="520" height="85" rx="8" fill="#faf5ff" stroke="#ede9fe" stroke-width="1.5"/>
  <text x="236" y="422" fill="#581c87" font-size="13" font-weight="600">Tier 2: npm 依赖层</text>
  <rect x="240" y="432" width="130" height="40" rx="6" fill="#ffffff" stroke="#ddd6fe" stroke-width="1.2"/>
  <text x="305" y="457" text-anchor="middle" fill="#3b0764" font-size="13">worker-bundler</text>
  <rect x="390" y="432" width="130" height="40" rx="6" fill="#ffffff" stroke="#ddd6fe" stroke-width="1.2"/>
  <text x="455" y="457" text-anchor="middle" fill="#3b0764" font-size="13">esbuild</text>
  <rect x="540" y="432" width="130" height="40" rx="6" fill="#ffffff" stroke="#ddd6fe" stroke-width="1.2"/>
  <text x="605" y="457" text-anchor="middle" fill="#3b0764" font-size="13">npm registry</text>

  <!-- Arrow Tier2 -> Tier1 -->
  <line x1="480" y1="485" x2="480" y2="498" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- Tier 1: Dynamic Worker (y=500-585) -->
  <rect x="220" y="500" width="520" height="85" rx="8" fill="#eff6ff" stroke="#dbeafe" stroke-width="1.5"/>
  <text x="236" y="522" fill="#1e40af" font-size="13" font-weight="600">Tier 1: Dynamic Worker</text>
  <rect x="240" y="532" width="130" height="40" rx="6" fill="#ffffff" stroke="#bfdbfe" stroke-width="1.2"/>
  <text x="305" y="557" text-anchor="middle" fill="#1e3a5f" font-size="13">V8 Isolate</text>
  <rect x="390" y="532" width="130" height="40" rx="6" fill="#ffffff" stroke="#bfdbfe" stroke-width="1.2"/>
  <text x="455" y="557" text-anchor="middle" fill="#1e3a5f" font-size="13">Worker Loader</text>
  <rect x="540" y="532" width="130" height="40" rx="6" fill="#ffffff" stroke="#bfdbfe" stroke-width="1.2"/>
  <text x="605" y="557" text-anchor="middle" fill="#1e3a5f" font-size="13">Capability Bindings</text>

  <!-- Arrow Tier1 -> Tier0 -->
  <line x1="480" y1="585" x2="480" y2="598" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- Tier 0: Workspace (y=600-685) -->
  <rect x="220" y="600" width="520" height="85" rx="8" fill="#f0fdf4" stroke="#dcfce7" stroke-width="1.5"/>
  <text x="236" y="622" fill="#166534" font-size="13" font-weight="600">Tier 0: Workspace</text>
  <rect x="240" y="632" width="130" height="40" rx="6" fill="#ffffff" stroke="#bbf7d0" stroke-width="1.2"/>
  <text x="305" y="657" text-anchor="middle" fill="#14532d" font-size="13">DO SQLite</text>
  <rect x="390" y="632" width="130" height="40" rx="6" fill="#ffffff" stroke="#bbf7d0" stroke-width="1.2"/>
  <text x="455" y="657" text-anchor="middle" fill="#14532d" font-size="13">R2 Spillover</text>
  <rect x="540" y="632" width="130" height="40" rx="6" fill="#ffffff" stroke="#bbf7d0" stroke-width="1.2"/>
  <text x="605" y="657" text-anchor="middle" fill="#14532d" font-size="13">文件工具集</text>

  <!-- ============================================ -->
  <!-- LEFT CONTROL PLANE (x=30-200)               -->
  <!-- ============================================ -->
  <text x="110" y="224" text-anchor="middle" fill="#6b7280" font-size="12" font-weight="600">控制面</text>

  <!-- AI Gateway -->
  <rect x="30" y="232" width="160" height="44" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="110" y="259" text-anchor="middle" fill="#1e40af" font-size="13" font-weight="600">AI Gateway</text>

  <!-- Workers AI -->
  <rect x="30" y="320" width="160" height="44" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="110" y="347" text-anchor="middle" fill="#1e40af" font-size="13" font-weight="600">Workers AI</text>

  <!-- Session / Memory -->
  <rect x="30" y="408" width="160" height="44" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="110" y="435" text-anchor="middle" fill="#166534" font-size="13" font-weight="600">Session / Memory</text>

  <!-- AI Search -->
  <rect x="30" y="496" width="160" height="44" rx="8" fill="#faf5ff" stroke="#ddd6fe" stroke-width="1.5"/>
  <text x="110" y="523" text-anchor="middle" fill="#581c87" font-size="13" font-weight="600">AI Search</text>

  <!-- Workflows -->
  <rect x="30" y="584" width="160" height="44" rx="8" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="110" y="611" text-anchor="middle" fill="#374151" font-size="13" font-weight="600">Workflows</text>

  <!-- ============================================ -->
  <!-- RIGHT SECURITY PLANE (x=760-930)            -->
  <!-- ============================================ -->
  <text x="850" y="278" text-anchor="middle" fill="#6b7280" font-size="12" font-weight="600">安全面</text>

  <!-- Access -->
  <rect x="770" y="288" width="160" height="44" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
  <text x="850" y="315" text-anchor="middle" fill="#9a3412" font-size="13" font-weight="600">Access</text>

  <!-- Mesh -->
  <rect x="770" y="368" width="160" height="44" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
  <text x="850" y="395" text-anchor="middle" fill="#9a3412" font-size="13" font-weight="600">Mesh</text>

  <!-- MCP Portal -->
  <rect x="770" y="448" width="160" height="44" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
  <text x="850" y="475" text-anchor="middle" fill="#9a3412" font-size="13" font-weight="600">MCP Portal</text>

  <!-- ============================================ -->
  <!-- HORIZONTAL ARROWS: Left Control -> Ladder    -->
  <!-- Green dashed (#059669)                       -->
  <!-- ============================================ -->
  <line x1="190" y1="254" x2="218" y2="254" stroke="#059669" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-green)"/>
  <line x1="190" y1="342" x2="218" y2="342" stroke="#059669" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-green)"/>
  <line x1="190" y1="430" x2="218" y2="430" stroke="#059669" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-green)"/>
  <line x1="190" y1="518" x2="218" y2="518" stroke="#059669" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-green)"/>
  <line x1="190" y1="606" x2="218" y2="606" stroke="#059669" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-green)"/>

  <!-- ============================================ -->
  <!-- HORIZONTAL ARROWS: Right Security -> Ladder  -->
  <!-- Orange dashed (#ea580c)                      -->
  <!-- ============================================ -->
  <line x1="770" y1="310" x2="742" y2="310" stroke="#ea580c" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-orange)"/>
  <line x1="770" y1="390" x2="742" y2="390" stroke="#ea580c" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-orange)"/>
  <line x1="770" y1="470" x2="742" y2="470" stroke="#ea580c" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-orange)"/>

  <!-- ============================================ -->
  <!-- BOTTOM DATA LAYER (y=710-770)                -->
  <!-- ============================================ -->
  <rect x="220" y="710" width="520" height="60" rx="8" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="236" y="728" fill="#6b7280" font-size="11" font-weight="600">数据层</text>

  <!-- Durable Objects cylinder -->
  <ellipse cx="340" cy="733" rx="40" ry="10" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.2"/>
  <rect x="300" y="733" width="80" height="28" fill="#dbeafe" stroke="none"/>
  <line x1="300" y1="733" x2="300" y2="761" stroke="#93c5fd" stroke-width="1.2"/>
  <line x1="380" y1="733" x2="380" y2="761" stroke="#93c5fd" stroke-width="1.2"/>
  <ellipse cx="340" cy="761" rx="40" ry="10" fill="#bfdbfe" stroke="#93c5fd" stroke-width="1.2"/>
  <text x="340" y="752" text-anchor="middle" fill="#1e40af" font-size="12">Durable Objects</text>

  <!-- R2 Storage cylinder -->
  <ellipse cx="520" cy="733" rx="40" ry="10" fill="#f0fdf4" stroke="#86efac" stroke-width="1.2"/>
  <rect x="480" y="733" width="80" height="28" fill="#f0fdf4" stroke="none"/>
  <line x1="480" y1="733" x2="480" y2="761" stroke="#86efac" stroke-width="1.2"/>
  <line x1="560" y1="733" x2="560" y2="761" stroke="#86efac" stroke-width="1.2"/>
  <ellipse cx="520" cy="761" rx="40" ry="10" fill="#dcfce7" stroke="#86efac" stroke-width="1.2"/>
  <text x="520" y="752" text-anchor="middle" fill="#166534" font-size="12">R2 Storage</text>

  <!-- Artifacts box -->
  <rect x="640" y="735" width="90" height="26" rx="6" fill="#faf5ff" stroke="#ddd6fe" stroke-width="1.2"/>
  <text x="685" y="752" text-anchor="middle" fill="#581c87" font-size="12">Artifacts</text>

  <!-- ============================================ -->
  <!-- ARROWS: Tier 0 -> Bottom Data Layer          -->
  <!-- Purple (#7c3aed)                             -->
  <!-- ============================================ -->
  <line x1="340" y1="685" x2="340" y2="731" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
  <line x1="480" y1="685" x2="520" y2="731" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
  <line x1="620" y1="685" x2="685" y2="733" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow-purple)"/>

  <!-- ============================================ -->
  <!-- LEGEND (bottom-left)                         -->
  <!-- ============================================ -->
  <g transform="translate(30, 740)">
    <line x1="0" y1="8" x2="30" y2="8" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
    <text x="38" y="12" fill="#6b7280" font-size="12">数据/请求流</text>
    <line x1="0" y1="28" x2="30" y2="28" stroke="#059669" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-green)"/>
    <text x="38" y="32" fill="#6b7280" font-size="12">控制面</text>
    <line x1="130" y1="8" x2="160" y2="8" stroke="#ea580c" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-orange)"/>
    <text x="168" y="12" fill="#6b7280" font-size="12">安全面</text>
    <line x1="130" y1="28" x2="160" y2="28" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
    <text x="168" y="32" fill="#6b7280" font-size="12">数据持久化</text>
  </g>

</svg>
