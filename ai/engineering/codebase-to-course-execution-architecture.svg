<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900">
  <style>
    text {
      font-family: "Helvetica Neue", Helvetica, Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
      fill: #111827;
    }
    .title { font-size: 24px; font-weight: 700; }
    .subtitle { font-size: 13px; fill: #6b7280; }
    .lane-label { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; fill: #6b7280; }
    .node-title { font-size: 14px; font-weight: 700; }
    .node-sub { font-size: 11px; fill: #6b7280; }
    .small { font-size: 10px; fill: #6b7280; }
    .legend { font-size: 12px; fill: #6b7280; }
    .edge-label { font-size: 11px; fill: #374151; }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#059669"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="1200" height="900" fill="#ffffff"/>

  <text x="48" y="42" class="title">codebase-to-course 执行架构图</text>
  <text x="48" y="64" class="subtitle">从代码仓库输入到课程目录产物的执行流水线；复杂仓库时会进入 briefs + subagents 并行写作路径</text>

  <!-- Lanes -->
  <rect x="40" y="90" width="1120" height="120" rx="8" fill="#f8fafc" stroke="#d1d5db" stroke-dasharray="6,4"/>
  <text x="56" y="108" class="lane-label">INPUT / TRIGGER</text>

  <rect x="40" y="230" width="1120" height="150" rx="8" fill="#f8fafc" stroke="#d1d5db" stroke-dasharray="6,4"/>
  <text x="56" y="248" class="lane-label">UNDERSTAND / DESIGN</text>

  <rect x="40" y="400" width="1120" height="290" rx="8" fill="#f8fafc" stroke="#d1d5db" stroke-dasharray="6,4"/>
  <text x="56" y="418" class="lane-label">BUILD PATHS</text>

  <rect x="40" y="710" width="1120" height="110" rx="8" fill="#f8fafc" stroke="#d1d5db" stroke-dasharray="6,4"/>
  <text x="56" y="728" class="lane-label">OUTPUT / REVIEW</text>

  <!-- Input nodes -->
  <g filter="url(#shadow)">
    <path d="M 90 130 L 228 130 L 240 142 L 240 192 L 90 192 Z" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
    <path d="M 228 130 L 228 142 L 240 142" fill="#e5e7eb" stroke="#d1d5db" stroke-width="1"/>
    <text x="165" y="160" text-anchor="middle" class="node-title">本地目录</text>
    <text x="165" y="178" text-anchor="middle" class="node-sub">./my-project</text>

    <path d="M 285 130 L 423 130 L 435 142 L 435 192 L 285 192 Z" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
    <path d="M 423 130 L 423 142 L 435 142" fill="#e5e7eb" stroke="#d1d5db" stroke-width="1"/>
    <text x="360" y="160" text-anchor="middle" class="node-title">GitHub 仓库</text>
    <text x="360" y="178" text-anchor="middle" class="node-sub">先 clone 到 /tmp</text>

    <path d="M 480 130 L 618 130 L 630 142 L 630 192 L 480 192 Z" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
    <path d="M 618 130 L 618 142 L 630 142" fill="#e5e7eb" stroke="#d1d5db" stroke-width="1"/>
    <text x="555" y="160" text-anchor="middle" class="node-title">当前项目</text>
    <text x="555" y="178" text-anchor="middle" class="node-sub">当前工作目录</text>

    <rect x="675" y="126" width="165" height="70" rx="8" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/>
    <text x="758" y="154" text-anchor="middle" class="node-title">触发语义</text>
    <text x="758" y="173" text-anchor="middle" class="node-sub">turn this into a course</text>

    <rect x="910" y="118" width="190" height="84" rx="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
    <rect x="916" y="124" width="178" height="72" rx="8" fill="none" stroke="#60a5fa" stroke-width="0.8" opacity="0.55"/>
    <text x="1005" y="150" text-anchor="middle" class="node-title">代码仓库入口</text>
    <text x="1005" y="170" text-anchor="middle" class="node-sub">解析输入类型并定位仓库</text>
    <text x="1005" y="186" text-anchor="middle" class="node-sub">本地 / 当前项目 / clone 后路径</text>
  </g>

  <!-- Understanding nodes -->
  <g filter="url(#shadow)">
    <rect x="120" y="270" width="270" height="82" rx="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
    <text x="255" y="300" text-anchor="middle" class="node-title">Phase 1 · 代码分析</text>
    <text x="255" y="319" text-anchor="middle" class="node-sub">读 README、入口文件、UI 与数据流</text>
    <text x="255" y="337" text-anchor="middle" class="node-sub">提取角色、API、模式、坑点</text>

    <rect x="470" y="270" width="250" height="82" rx="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
    <text x="595" y="300" text-anchor="middle" class="node-title">Phase 2 · 课程设计</text>
    <text x="595" y="319" text-anchor="middle" class="node-sub">规划 4-6 个模块的教学弧线</text>
    <text x="595" y="337" text-anchor="middle" class="node-sub">每模块至少包含代码翻译 + 测验</text>

    <polygon points="865,267 945,311 865,355 785,311" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/>
    <text x="865" y="305" text-anchor="middle" class="node-title">简单 / 复杂?</text>
    <text x="865" y="323" text-anchor="middle" class="node-sub">≤5 模块 还是 6+ 模块</text>

    <rect x="960" y="274" width="150" height="74" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
    <text x="1035" y="300" text-anchor="middle" class="node-title">决策依据</text>
    <text x="1035" y="319" text-anchor="middle" class="node-sub">单体 / 多服务 / monorepo</text>
    <text x="1035" y="336" text-anchor="middle" class="node-sub">内容规模与模块数</text>
  </g>

  <!-- Build path shared nodes -->
  <g filter="url(#shadow)">
    <rect x="100" y="455" width="220" height="82" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
    <text x="210" y="486" text-anchor="middle" class="node-title">Step 1 · 复制固定资产</text>
    <text x="210" y="505" text-anchor="middle" class="node-sub">styles.css / main.js / _footer.html</text>
    <text x="210" y="523" text-anchor="middle" class="node-sub">build.sh 全部 verbatim 拷贝</text>

    <rect x="390" y="455" width="230" height="82" rx="10" fill="#f0fdfa" stroke="#99f6e4" stroke-width="1.5"/>
    <text x="505" y="486" text-anchor="middle" class="node-title">Step 2 · 定制 _base.html</text>
    <text x="505" y="505" text-anchor="middle" class="node-sub">替换标题、主题色、导航点</text>
    <text x="505" y="523" text-anchor="middle" class="node-sub">保留已有壳子与运行时接线</text>

    <rect x="875" y="455" width="220" height="82" rx="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
    <text x="985" y="486" text-anchor="middle" class="node-title">Step 4 · 组装课程</text>
    <text x="985" y="505" text-anchor="middle" class="node-sub">在课程目录运行 build.sh</text>
    <text x="985" y="523" text-anchor="middle" class="node-sub">拼出最终 index.html</text>

    <!-- Simple path -->
    <rect x="110" y="585" width="250" height="82" rx="10" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
    <text x="235" y="616" text-anchor="middle" class="node-title">顺序路径</text>
    <text x="235" y="635" text-anchor="middle" class="node-sub">逐个写 modules/01..0N.html</text>
    <text x="235" y="653" text-anchor="middle" class="node-sub">适合小仓库 / 入口清晰项目</text>

    <!-- Complex path -->
    <rect x="465" y="585" width="210" height="82" rx="10" fill="#faf5ff" stroke="#d8b4fe" stroke-width="1.5"/>
    <text x="570" y="616" text-anchor="middle" class="node-title">Phase 2.5 · briefs</text>
    <text x="570" y="635" text-anchor="middle" class="node-sub">预抽代码片段与互动要求</text>
    <text x="570" y="653" text-anchor="middle" class="node-sub">把上下文压成模块 brief</text>

    <rect x="740" y="585" width="220" height="82" rx="10" fill="#faf5ff" stroke="#d8b4fe" stroke-width="1.5"/>
    <text x="850" y="616" text-anchor="middle" class="node-title">并行 subagents</text>
    <text x="850" y="635" text-anchor="middle" class="node-sub">按批次最多 3 个 agent 写模块</text>
    <text x="850" y="653" text-anchor="middle" class="node-sub">只拿 brief 与必要 references</text>

    <rect x="995" y="585" width="120" height="82" rx="10" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
    <text x="1055" y="616" text-anchor="middle" class="node-title">一致性检查</text>
    <text x="1055" y="635" text-anchor="middle" class="node-sub">过渡语气</text>
    <text x="1055" y="653" text-anchor="middle" class="node-sub">nav dots 对齐</text>
  </g>

  <!-- Output nodes -->
  <g filter="url(#shadow)">
    <path d="M 120 742 L 318 742 L 330 754 L 330 800 L 120 800 Z" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
    <path d="M 318 742 L 318 754 L 330 754" fill="#e5e7eb" stroke="#d1d5db" stroke-width="1"/>
    <text x="225" y="769" text-anchor="middle" class="node-title">course-name/</text>
    <text x="225" y="787" text-anchor="middle" class="node-sub">styles.css · main.js · _base.html</text>

    <path d="M 430 742 L 648 742 L 660 754 L 660 800 L 430 800 Z" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
    <path d="M 648 742 L 648 754 L 660 754" fill="#e5e7eb" stroke="#d1d5db" stroke-width="1"/>
    <text x="545" y="769" text-anchor="middle" class="node-title">modules/ + briefs/ + index.html</text>
    <text x="545" y="787" text-anchor="middle" class="node-sub">briefs 只在复杂路径出现，可后删</text>

    <rect x="780" y="742" width="160" height="58" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
    <rect x="780" y="742" width="160" height="18" rx="8" fill="#1f2937"/>
    <rect x="780" y="754" width="160" height="6" fill="#1f2937"/>
    <circle cx="794" cy="751" r="3.5" fill="#ef4444"/>
    <circle cx="806" cy="751" r="3.5" fill="#f59e0b"/>
    <circle cx="818" cy="751" r="3.5" fill="#10b981"/>
    <text x="860" y="781" text-anchor="middle" class="node-title">浏览器打开 index.html</text>

    <rect x="995" y="742" width="120" height="58" rx="8" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/>
    <text x="1055" y="769" text-anchor="middle" class="node-title">用户反馈</text>
    <text x="1055" y="787" text-anchor="middle" class="node-sub">内容 / 设计 / 交互</text>
  </g>

  <!-- Main arrows -->
  <line x1="240" y1="161" x2="910" y2="161" stroke="#2563eb" stroke-width="1.7" marker-end="url(#arrow-blue)"/>
  <line x1="435" y1="161" x2="910" y2="161" stroke="#2563eb" stroke-width="1.7" marker-end="url(#arrow-blue)" opacity="0.75"/>
  <line x1="630" y1="161" x2="910" y2="161" stroke="#2563eb" stroke-width="1.7" marker-end="url(#arrow-blue)" opacity="0.75"/>
  <line x1="840" y1="161" x2="910" y2="161" stroke="#2563eb" stroke-width="1.7" marker-end="url(#arrow-blue)"/>

  <line x1="1005" y1="202" x2="1005" y2="250" stroke="#2563eb" stroke-width="1.7" marker-end="url(#arrow-blue)"/>
  <path d="M 960 311 C 870 311 430 311 390 311" fill="none" stroke="#2563eb" stroke-width="1.7" marker-end="url(#arrow-blue)"/>
  <line x1="390" y1="311" x2="470" y2="311" stroke="#2563eb" stroke-width="1.7" marker-end="url(#arrow-blue)"/>
  <line x1="720" y1="311" x2="785" y2="311" stroke="#2563eb" stroke-width="1.7" marker-end="url(#arrow-blue)"/>
  <line x1="945" y1="311" x2="960" y2="311" stroke="#2563eb" stroke-width="1.7" marker-end="url(#arrow-blue)"/>

  <line x1="865" y1="355" x2="865" y2="430" stroke="#2563eb" stroke-width="1.7" marker-end="url(#arrow-blue)"/>
  <line x1="865" y1="430" x2="620" y2="430" stroke="#2563eb" stroke-width="1.7"/>
  <line x1="620" y1="430" x2="620" y2="496" stroke="#2563eb" stroke-width="1.7" marker-end="url(#arrow-blue)"/>
  <line x1="620" y1="496" x2="875" y2="496" stroke="#2563eb" stroke-width="1.7" marker-end="url(#arrow-blue)"/>

  <line x1="320" y1="496" x2="390" y2="496" stroke="#2563eb" stroke-width="1.7" marker-end="url(#arrow-blue)"/>

  <!-- Branch arrows -->
  <path d="M 505 537 C 505 560 360 560 360 626" fill="none" stroke="#ea580c" stroke-width="1.7" marker-end="url(#arrow-orange)"/>
  <path d="M 620 496 C 680 496 680 626 740 626" fill="none" stroke="#ea580c" stroke-width="1.7" marker-end="url(#arrow-orange)"/>

  <line x1="675" y1="626" x2="740" y2="626" stroke="#7c3aed" stroke-width="1.7" stroke-dasharray="5,3" marker-end="url(#arrow-purple)"/>
  <line x1="960" y1="626" x2="995" y2="626" stroke="#7c3aed" stroke-width="1.7" stroke-dasharray="5,3" marker-end="url(#arrow-purple)"/>
  <path d="M 360 626 C 520 626 650 560 875 496" fill="none" stroke="#ea580c" stroke-width="1.7" marker-end="url(#arrow-orange)"/>
  <path d="M 1115 626 C 1115 560 1040 540 1095 496" fill="none" stroke="#7c3aed" stroke-width="1.7" stroke-dasharray="5,3" marker-end="url(#arrow-purple)"/>

  <!-- Artifact arrows -->
  <path d="M 210 537 C 210 630 225 630 225 742" fill="none" stroke="#059669" stroke-width="1.7" stroke-dasharray="5,3" marker-end="url(#arrow-green)"/>
  <path d="M 985 537 C 985 650 545 650 545 742" fill="none" stroke="#059669" stroke-width="1.7" marker-end="url(#arrow-green)"/>
  <line x1="330" y1="771" x2="430" y2="771" stroke="#059669" stroke-width="1.7" marker-end="url(#arrow-green)"/>
  <line x1="660" y1="771" x2="780" y2="771" stroke="#059669" stroke-width="1.7" marker-end="url(#arrow-green)"/>
  <line x1="940" y1="771" x2="995" y2="771" stroke="#2563eb" stroke-width="1.7" marker-end="url(#arrow-blue)"/>

  <!-- Edge labels -->
  <rect x="944" y="217" width="122" height="18" rx="4" fill="#ffffff" opacity="0.9"/>
  <text x="1005" y="230" text-anchor="middle" class="edge-label">定位仓库路径</text>

  <rect x="514" y="286" width="86" height="18" rx="4" fill="#ffffff" opacity="0.9"/>
  <text x="557" y="299" text-anchor="middle" class="edge-label">教学抽象</text>

  <rect x="770" y="443" width="108" height="18" rx="4" fill="#ffffff" opacity="0.9"/>
  <text x="824" y="456" text-anchor="middle" class="edge-label">共享前置步骤</text>

  <rect x="340" y="575" width="70" height="18" rx="4" fill="#ffffff" opacity="0.9"/>
  <text x="375" y="588" text-anchor="middle" class="edge-label">简单仓库</text>

  <rect x="650" y="575" width="70" height="18" rx="4" fill="#ffffff" opacity="0.9"/>
  <text x="685" y="588" text-anchor="middle" class="edge-label">复杂仓库</text>

  <rect x="792" y="607" width="114" height="18" rx="4" fill="#ffffff" opacity="0.9"/>
  <text x="849" y="620" text-anchor="middle" class="edge-label">批量并行写模块</text>

  <rect x="130" y="688" width="160" height="18" rx="4" fill="#ffffff" opacity="0.9"/>
  <text x="210" y="701" text-anchor="middle" class="edge-label">复制固定引用资产</text>

  <rect x="470" y="688" width="150" height="18" rx="4" fill="#ffffff" opacity="0.9"/>
  <text x="545" y="701" text-anchor="middle" class="edge-label">生成课程目录与页面</text>

  <!-- Notes -->
  <text x="872" y="371" class="small">复杂条件：全栈、多服务、内容重、monorepo、或课程 6+ 模块</text>
  <text x="740" y="675" class="small">subagent 不拿完整代码库，只拿 brief 与必要 references</text>

  <!-- Legend -->
  <g transform="translate(48,842)">
    <line x1="0" y1="0" x2="34" y2="0" stroke="#2563eb" stroke-width="1.7" marker-end="url(#arrow-blue)"/>
    <text x="42" y="4" class="legend">主执行流</text>

    <line x1="132" y1="0" x2="166" y2="0" stroke="#ea580c" stroke-width="1.7" marker-end="url(#arrow-orange)"/>
    <text x="174" y="4" class="legend">简单 / 复杂分支</text>

    <line x1="320" y1="0" x2="354" y2="0" stroke="#7c3aed" stroke-width="1.7" stroke-dasharray="5,3" marker-end="url(#arrow-purple)"/>
    <text x="362" y="4" class="legend">briefs 与 subagents 并行流</text>

    <line x1="582" y1="0" x2="616" y2="0" stroke="#059669" stroke-width="1.7" stroke-dasharray="5,3" marker-end="url(#arrow-green)"/>
    <text x="624" y="4" class="legend">文件 / 产物流</text>
  </g>
</svg>
