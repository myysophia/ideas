    <text x="36" y="12" fill="#6b7280" font-size="11">请求流 Request Flow</text>
    <line x1="190" y1="8" x2="218" y2="8" stroke="#ea580c" stroke-width="1.5" marker-end="url(#a-orange)"/>
    <text x="226" y="12" fill="#6b7280" font-size="11">AI 路由 AI Routing</text>
    <rect x="390" y="1" width="14" height="14" rx="3" fill="#fef2f2" stroke="#e8b4b8" stroke-width="1"/>
    <text x="409" y="12" fill="#6b7280" font-size="11">安全</text>
    <rect x="450" y="1" width="14" height="14" rx="3" fill="#fff7ed" stroke="#F38020" stroke-width="1"/>
    <text x="469" y="12" fill="#6b7280" font-size="11">AI / 交付</text>
    <rect x="530" y="1" width="14" height="14" rx="3" fill="#fefce8" stroke="#c9b896" stroke-width="1"/>
    <text x="549" y="12" fill="#6b7280" font-size="11">数据</text>
    <rect x="585" y="1" width="14" height="14" rx="3" fill="#faf5ff" stroke="#c4b5fd" stroke-width="1"/>
    <text x="604" y="12" fill="#6b7280" font-size="11">编排</text>
  </g>
  <text x="1150" y="730" text-anchor="end" fill="#9a9590" font-size="10">Cloudflare AI 全栈架构 · 2026</text>
