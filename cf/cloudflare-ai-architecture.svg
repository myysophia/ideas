  <rect x="317" y="80" width="126" height="36" rx="8" fill="#ffffff" stroke="#e8b4b8" stroke-width="1.2"/>
  <text x="380" y="103" text-anchor="middle" fill="#111827" font-size="13" font-weight="500">WAF</text>
  <rect x="517" y="80" width="126" height="36" rx="8" fill="#ffffff" stroke="#e8b4b8" stroke-width="1.2"/>
  <text x="580" y="103" text-anchor="middle" fill="#111827" font-size="13" font-weight="500">API Shield</text>
  <rect x="717" y="80" width="126" height="36" rx="8" fill="#ffffff" stroke="#e8b4b8" stroke-width="1.2"/>
