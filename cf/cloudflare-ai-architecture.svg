  <rect x="520" y="618" width="120" height="38" rx="8" fill="#ffffff" stroke="#c4b5fd" stroke-width="1.2"/>
  <text x="580" y="642" text-anchor="middle" fill="#111827" font-size="13" font-weight="500">Queues</text>
  <rect x="725" y="618" width="130" height="38" rx="8" fill="#ffffff" stroke="#c4b5fd" stroke-width="1.2"/>
  <text x="790" y="642" text-anchor="middle" fill="#111827" font-size="13" font-weight="500">Workflows</text>
  <rect x="940" y="618" width="120" height="38" rx="8" fill="#ffffff" stroke="#c4b5fd" stroke-width="1.2"/>
  <text x="1000" y="642" text-anchor="middle" fill="#111827" font-size="13" font-weight="500">Pipelines</text>
