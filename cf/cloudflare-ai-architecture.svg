  <text x="835" y="438" text-anchor="middle" fill="#ffffff" font-size="8" font-weight="700">OpenAI</text>
  <circle cx="940" cy="434" r="14" fill="#D97757"/>
  <text x="940" y="438" text-anchor="middle" fill="#ffffff" font-size="8" font-weight="700">Anthropic</text>
  <circle cx="1045" cy="434" r="14" fill="#4285F4"/>
  <text x="1045" y="438" text-anchor="middle" fill="#ffffff" font-size="8" font-weight="700">Gemini</text>
  <line x1="322" y1="425" x2="602.9807621135332" y2="425" stroke="#ea580c" stroke-width="1.5" marker-end="url(#a-orange)"/>
  <line x1="608.9807621135332" y1="425" x2="788" y2="425" stroke="#ea580c" stroke-width="1.5" marker-end="url(#a-orange)"/>
  <line x1="600" y1="456" x2="600" y2="482" stroke="#2563eb" stroke-width="1.5" marker-end="url(#a-blue)"/>
