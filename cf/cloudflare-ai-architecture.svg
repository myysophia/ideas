  <rect x="317" y="512" width="126" height="38" rx="8" fill="#ffffff" stroke="#c9b896" stroke-width="1.2"/>
  <text x="380" y="536" text-anchor="middle" fill="#111827" font-size="13" font-weight="500">D1</text>
  <rect x="517" y="512" width="126" height="38" rx="8" fill="#ffffff" stroke="#c9b896" stroke-width="1.2"/>
  <text x="580" y="536" text-anchor="middle" fill="#111827" font-size="13" font-weight="500">KV</text>
  <rect x="717" y="512" width="126" height="38" rx="8" fill="#ffffff" stroke="#c9b896" stroke-width="1.2"/>
  <text x="780" y="536" text-anchor="middle" fill="#111827" font-size="13" font-weight="500">Vectorize</text>
