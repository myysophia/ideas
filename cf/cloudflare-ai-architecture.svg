  <text x="980" y="536" text-anchor="middle" fill="#111827" font-size="13" font-weight="500">AI Search</text>
  <line x1="600" y1="562" x2="600" y2="588" stroke="#2563eb" stroke-width="1.5" marker-end="url(#a-blue)"/>
